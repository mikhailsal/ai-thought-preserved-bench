    reasoning_type: open
    supports_forced_tool_choice: false
    active: true
    notes: >
      Visible reasoning via reasoning.text. Using Novita provider.
      Previous 0-token results were caused by proxy not forwarding reasoning params.
      DeepSeek reasoner rejects forced tool_choice (HTTP 400).

