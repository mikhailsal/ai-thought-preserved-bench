    provider: Google AI Studio
    reasoning_type: open
    active: true
    notes: "Visible reasoning via plaintext reasoning_content. Smaller Gemma MoE variant, free tier."

  # ───────────────────────────────────────────────────────────────
  # X-AI — Grok (encrypted + summary reasoning)
  # ───────────────────────────────────────────────────────────────
  - model_id: x-ai/grok-4.1-fast
    display_label: grok-4.1-fast@medium-t1.2
    temperature: 1.2
    reasoning_effort: medium
    provider: xAI
    reasoning_type: summarization_and_encrypted
    active: true
    notes: >
      Reasoning via reasoning.summary + reasoning.encrypted blocks (xai-responses-v1 format).
      Encrypted content preserves state across turns but is not human-readable.

  # ───────────────────────────────────────────────────────────────
  # StepFun free tier
  # ───────────────────────────────────────────────────────────────
  - model_id: stepfun/step-3.5-flash:free
