    notes: "Visible reasoning via reasoning field. 196B MoE (11B active), free tier."

  # ───────────────────────────────────────────────────────────────
  # Tencent (free tier)
  # ───────────────────────────────────────────────────────────────
  - model_id: tencent/hy3-preview:free
    display_label: hy3-preview:free@medium-t1.2
    temperature: 1.2
    reasoning_effort: medium
    provider: SiliconFlow
    reasoning_type: open
    active: true
    notes: >
      Visible reasoning via reasoning.text. Only provider: SiliconFlow.
      Upgraded minimal→medium: at minimal effort the model debated whether to pick
      numbers instead of computing.

  # ───────────────────────────────────────────────────────────────
  # DeepSeek
  # ───────────────────────────────────────────────────────────────
  - model_id: deepseek/deepseek-v4-flash
    display_label: deepseek-v4-flash@medium-t1.2
    temperature: 1.2
    reasoning_effort: medium
    provider: DeepSeek
    reasoning_type: open
    supports_forced_tool_choice: false
    active: true
    notes: >
      Visible reasoning via reasoning.text. Pinned to DeepSeek (native).
      Upgraded minimal→medium: at minimal effort the model summarized the task
      without picking numbers or computing.
      DeepSeek reasoner rejects forced tool_choice (HTTP 400).

  - model_id: deepseek/deepseek-v3.2
