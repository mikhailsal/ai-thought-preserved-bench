    temperature: 1.2
    reasoning_effort: medium
    provider: Bedrock
    reasoning_type: open
    active: true
    notes: >
      Visible reasoning via reasoning.text (structured_text format).
      Provider changed from DeepInfra→Bedrock: KiloCode gateway ignores provider.order
      and prioritizes its own BYOK credentials, routing to Amazon Bedrock instead.
      All historical runs were actually served by Bedrock, not DeepInfra.

