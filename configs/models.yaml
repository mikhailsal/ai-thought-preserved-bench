    notes: >
      Visible reasoning via reasoning.text. Pinned to Alibaba (native Qwen provider).
      Upgraded minimal→medium: at minimal effort the model philosophized instead of computing.
      Alibaba endpoint does not support forced tool_choice (HTTP 404).

